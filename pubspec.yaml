name: cleanliness_environmental_awareness
description: Cleanliness & Environmental Awareness Flutter app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.1
  firebase_messaging: ^15.2.2
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  image_picker: ^1.1.2
  flutter_tts: ^4.2.2
  intl: ^0.19.0
  google_sign_in: ^6.2.1
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/tips.json
